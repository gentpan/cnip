# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cnip.io www.cnip.io;
    location /.well-known/acme-challenge/ {
        root /www/wwwroot/cnip.io;
    }
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cnip.io www.cnip.io;
    root /www/wwwroot/cnip.io;
    include /www/server/panel/vhost/nginx/extension/cnip.io/*.conf;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/cnip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cnip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /.well-known/acme-challenge/ {
        root /www/wwwroot/cnip.io;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:18083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /geoip {
        proxy_pass http://127.0.0.1:18083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /lookup {
        proxy_pass http://127.0.0.1:18083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:18083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /db-info.json {
        add_header Cache-Control "public, max-age=2592000";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /_nuxt/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/cnip.io.log;
    error_log /www/wwwlogs/cnip.io.error.log;
}
