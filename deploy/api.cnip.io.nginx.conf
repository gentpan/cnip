# api.cnip.io - unified API entry
server {
    listen 80;
    server_name api.cnip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.cnip.io;

    ssl_certificate /etc/letsencrypt/live/api.cnip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cnip.io/privkey.pem;

    location /api/ip {
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 "{\"ip\":\"$remote_addr\",\"source\":\"api.cnip.io\"}";
    }

    location / {
        proxy_pass http://127.0.0.1:18083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /www/wwwlogs/api.cnip.io.log;
    error_log /www/wwwlogs/api.cnip.io.error.log;
}

